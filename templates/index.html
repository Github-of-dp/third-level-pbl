<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Third Level | Interactive Research</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-container">
        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('psychology')">Psychology</button>
            <button class="tab-btn" onclick="showTab('comparison')">Stress Gap</button>
            <button class="tab-btn" onclick="showTab('history')">Grand Central</button>
            <button class="tab-btn" onclick="showTab('verdict')">The Verdict</button>
        </nav>

        <header id="tab-header">
            <h1 id="main-title">Loading...</h1>
            <p id="main-desc"></p>
        </header>

        <div id="content-display" class="fade-in">
            </div>
    </div>

    <script>
        let researchData = {};

        fetch('/get_research')
            .then(res => res.json())
            .then(data => {
                researchData = data;
                showTab('psychology'); // Initial Load
            });

        function showTab(tabName) {
            const data = researchData[tabName];
            const display = document.getElementById('content-display');
            const headerTitle = document.getElementById('main-title');
            const headerDesc = document.getElementById('main-desc');

            // Update Tab Buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tabName.substring(0,3)));
            });

            // Trigger smooth fade out
            display.style.opacity = 0;

            setTimeout(() => {
                headerTitle.innerText = data.title;
                headerDesc.innerText = data.description || "";

                if(tabName === 'comparison') {
                    display.innerHTML = `
                        <div class="comparison-grid">
                            <div class="glass-card"><h3>1890s</h3><ul>${data.vintage.map(i => `<li>${i}</li>`).join('')}</ul></div>
                            <div class="glass-card"><h3>2026</h3><ul>${data.modern.map(i => `<li>${i}</li>`).join('')}</ul></div>
                        </div>`;
                } else if(data.details) {
                    display.innerHTML = `<ul class="detail-list">${data.details.map(i => `<li>${i}</li>`).join('')}</ul>`;
                } else {
                    display.innerHTML = `<div class="glass-card verdict">${data.content}</div>`;
                }
                
                display.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>

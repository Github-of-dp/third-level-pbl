<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Third Level | Research Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo">THE THIRD LEVEL</div>
        <div class="subtitle">A Multidisciplinary Research Journal</div>
    </header>

    <div class="container">
        <nav class="side-nav">
            <ul>
                <li class="nav-item active" onclick="loadChapter('chapter_1_psychological_profiling', this)">I. Psychology</li>
                <li class="nav-item" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)">II. Stress Gap</li>
                <li class="nav-item" onclick="loadChapter('chapter_3_architectural_symbolism', this)">III. Architecture</li>
                <li class="nav-item" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)">IV. The Case File</li>
                <li class="nav-item" onclick="loadChapter('chapter_5_glossary_of_concepts', this)">V. Concepts</li>
            </ul>
        </nav>

        <article class="content-area" id="view">
            </article>
    </div>

    <script>
        let db = {};

        async function init() {
            try {
                const response = await fetch('/get_research');
                db = await response.json();
                loadChapter('chapter_1_psychological_profiling', document.querySelector('.nav-item'));
            } catch (err) {
                console.error("Critical Error:", err);
            }
        }

        // The "Master Scraper" - finds text no matter where it is
        function extractContent(node, keyName) {
            let html = "";
            
            // If it's a string, it's the data we want
            if (typeof node === 'string') {
                return `<p class="main-text">${node}</p>`;
            }

            // If it's an array (like Bibliography or Glossary)
            if (Array.isArray(node)) {
                html += `<ul class="clean-list">`;
                node.forEach(item => {
                    if (typeof item === 'object') {
                        html += `<li><strong>${item.word || item.author || item.item || item.category || ''}:</strong> ${item.definition || item.title || item.purpose || item.use_case || ''}</li>`;
                    } else {
                        html += `<li>${item}</li>`;
                    }
                });
                html += `</ul>`;
                return html;
            }

            // If it's an object, we need to look inside
            if (typeof node === 'object' && node !== null) {
                // Check if this object is a "leaf" (has the actual data fields)
                const title = node.label || node.concept || node.term || node.word || node.category || "";
                const body = node.depth_analysis || node.description || node.truth || node.definition || node.content || node.initial_assessment || node.summary || "";
                const note = node.clinical_notes || node.sociological_result || node.physical_cost || node.thematic_link || node.impact || node.argument_01 || "";

                if (title || body) {
                    html += `<section class="article-section">`;
                    if (title) html += `<h2>${title}</h2>`;
                    if (body) html += `<p>${body}</p>`;
                    if (note) html += `<aside class="pull-quote">${note}</aside>`;
                    
                    // Handle special nested arrays like sensory_anchors
                    if (node.sensory_anchors) {
                        html += `<div class="data-box"><h4>SENSORY DATA</h4><ul>`;
                        node.sensory_anchors.forEach(a => html += `<li><strong>${a.item}:</strong> ${a.purpose}</li>`);
                        html += `</ul></div>`;
                    }
                    html += `</section>`;
                } else {
                    // It's a container object (like 'grand_central_analysis'), keep digging
                    Object.keys(node).forEach(subKey => {
                        html += extractContent(node[subKey], subKey);
                    });
                }
            }
            return html;
        }

        function loadChapter(key, el) {
            const chapterData = db[key];
            const view = document.getElementById('view');

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            view.scrollTo({top: 0, behavior: 'smooth'});

            let html = `<div class="fade-in">`;
            html += `<p class="chapter-num">COLLECTION</p>`;
            html += `<h1 class="article-title">${key.replace(/_/g, ' ').toUpperCase()}</h1>`;
            
            if (chapterData) {
                html += extractContent(chapterData, key);
            } else {
                html += `<p>Data node not found.</p>`;
            }

            html += `</div>`;
            view.innerHTML = html;
        }

        window.onload = init;
    </script>
</body>
</html>

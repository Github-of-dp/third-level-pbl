<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE THIRD LEVEL | AI ARCHIVE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dribbble-layout">

    <div class="glow-bg"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-box">L3</div>
            </div>
            <nav class="nav-icons">
                <div class="icon-btn active" onclick="loadChapter('chapter_1_psychological_profiling', this)" data-name="Psyche">
                    <i data-lucide="brain"></i>
                </div>
                <div class="icon-btn" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)" data-name="Stress">
                    <i data-lucide="zap"></i>
                </div>
                <div class="icon-btn" onclick="loadChapter('chapter_3_architectural_symbolism', this)" data-name="Space">
                    <i data-lucide="layout"></i>
                </div>
                <div class="icon-btn" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)" data-name="Dossier">
                    <i data-lucide="search"></i>
                </div>
                <div class="icon-btn" onclick="loadChapter('chapter_5_glossary_of_concepts', this)" data-name="Index">
                    <i data-lucide="database"></i>
                </div>
            </nav>
        </aside>

        <main class="workspace">
            <header class="top-bar">
                <div class="breadcrumb">PBL / <span id="current-segment">PSYCHE</span></div>
                <div class="user-status">RESEARCHER_MODE <span class="dot"></span></div>
            </header>

            <div id="content-grid" class="bento-grid">
                </div>
        </main>
    </div>

    <script>
        let db = {};

        async function init() {
            try {
                const res = await fetch('/get_research');
                db = await res.json();
                loadChapter('chapter_1_psychological_profiling', document.querySelector('.icon-btn'));
                lucide.createIcons();
            } catch (err) { console.error(err); }
        }

        function loadChapter(key, el) {
            const grid = document.getElementById('content-grid');
            const breadcrumb = document.getElementById('current-segment');

            document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            breadcrumb.innerText = el.getAttribute('data-name').toUpperCase();

            grid.style.opacity = 0;
            setTimeout(() => {
                grid.innerHTML = renderBento(db[key]);
                grid.style.opacity = 1;
                lucide.createIcons();
            }, 250);
        }

        function renderBento(node) {
            let html = "";
            if (typeof node === 'string') return `<div class="card full-span"><p>${node}</p></div>`;
            
            if (Array.isArray(node)) {
                html += `<div class="card full-span"><div class="card-label">Reference Data</div><ul class="clean-list">`;
                node.forEach(i => {
                    html += `<li>${typeof i === 'object' ? `<strong>${i.word || i.item || i.author}:</strong> ${i.definition || i.purpose || i.title}` : i}</li>`;
                });
                return html + `</ul></div>`;
            }

            if (typeof node === 'object') {
                const title = node.label || node.concept || node.term || node.word || "";
                const body = node.depth_analysis || node.description || node.truth || node.definition || "";
                const meta = node.clinical_notes || node.sociological_result || "";

                if (title || body) {
                    html += `
                        <div class="card">
                            <div class="card-label">Analysis Node</div>
                            <h3>${title}</h3>
                            <p>${body}</p>
                            ${meta ? `<div class="meta-info">${meta}</div>` : ''}
                        </div>`;
                } else {
                    Object.values(node).forEach(v => html += renderBento(v));
                }
            }
            return html;
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Third Level | Research Project</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="hero">
        <h1 class="reveal-text">The Third Level</h1>
        <p>A Grade 12 Research Project on Escapism & Stress</p>
    </header>

    <main id="content-area">
        <section id="psych-box" class="content-box hidden"></section>
        <section id="stress-box" class="content-box hidden"></section>
        <section id="history-box" class="content-box hidden"></section>
        <section id="verdict-box" class="content-box hidden"></section>
    </main>

    <script>
        // Fetch the research data from our Flask route
        fetch('/get_research')
            .then(response => response.json())
            .then(data => {
                // 1. Populate Psychology
                document.getElementById('psych-box').innerHTML = `
                    <h2>${data.psychology.title}</h2>
                    <p>${data.psychology.content}</p>
                `;

                // 2. Populate Comparison
                document.getElementById('stress-box').innerHTML = `
                    <h2>${data.comparison.title}</h2>
                    <div class="grid">
                        <div class="card">
                            <h3>The 1890s</h3>
                            <ul>${data.comparison.vintage.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="card">
                            <h3>Modern Day</h3>
                            <ul>${data.comparison.modern.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;

                // 3. Populate History
                document.getElementById('history-box').innerHTML = `
                    <h2>${data.history.title}</h2>
                    <p>${data.history.content}</p>
                `;

                // 4. Populate Verdict
                document.getElementById('verdict-box').innerHTML = `
                    <div class="verdict-banner">
                        <h2>${data.verdict.title}</h2>
                        <p>${data.verdict.content}</p>
                    </div>
                `;

                // Trigger the smooth animations
                const boxes = document.querySelectorAll('.content-box');
                boxes.forEach((box, index) => {
                    setTimeout(() => {
                        box.classList.remove('hidden');
                        box.classList.add('visible');
                    }, index * 300); // Staggered delay
                });
            });
    </script>
</body>
</html>

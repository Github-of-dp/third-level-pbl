<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Third Level | Research Dossier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="vintage-bg">

    <div class="desk-surface">
        <aside class="brass-sidebar">
            <div class="station-stamp">
                <i data-lucide="train"></i>
                <span>G.C.T 1894</span>
            </div>
            
            <nav class="lever-menu">
                <div class="lever active" onclick="loadPage('chapter_1_psychological_profiling', this)">
                    <i data-lucide="brain"></i> <span>Psychology</span>
                </div>
                <div class="lever" onclick="loadPage('chapter_2_socio_economic_stress_gap', this)">
                    <i data-lucide="clock"></i> <span>Stress Gap</span>
                </div>
                <div class="lever" onclick="loadPage('chapter_3_architectural_symbolism', this)">
                    <i data-lucide="map"></i> <span>Architecture</span>
                </div>
                <div class="lever" onclick="loadPage('chapter_4_sam_weiner_dossier', this)">
                    <i data-lucide="mail"></i> <span>Sam's File</span>
                </div>
                <div class="lever" onclick="loadPage('chapter_5_glossary_of_concepts', this)">
                    <i data-lucide="book-open"></i> <span>Glossary</span>
                </div>
            </nav>
            
            <div class="ticket-stub">
                <p>No. 1894-ADMIT</p>
            </div>
        </aside>

        <main class="parchment-container">
            <div id="content-view" class="ink-content fade-in">
                </div>
        </main>
    </div>

    <script>
        let researchData = {};

        // Fetch the 200+ line JSON
        fetch('/get_research')
            .then(res => res.json())
            .then(data => {
                researchData = data;
                // Initial load
                loadPage('chapter_1_psychological_profiling', document.querySelector('.lever'));
                lucide.createIcons();
            });

        function loadPage(key, element) {
            const content = researchData[key];
            const view = document.getElementById('content-view');
            
            // Toggle active state
            document.querySelectorAll('.lever').forEach(l => l.classList.remove('active'));
            element.classList.add('active');

            // Reset animation
            view.classList.remove('fade-in');
            void view.offsetWidth; 
            view.classList.add('fade-in');

            // Render Logic for different chapters
            let html = `<h1>${key.replace(/_/g, ' ').toUpperCase()}</h1>`;
            
            if (typeof content === 'object' && !Array.isArray(content)) {
                for (let subKey in content) {
                    let item = content[subKey];
                    if (typeof item === 'object') {
                        html += `
                            <section class="ink-block">
                                <h2>${item.label || item.concept || item.term || subKey.replace(/_/g, ' ')}</h2>
                                <p>${item.depth_analysis || item.description || item.truth || item.initial_assessment || ''}</p>
                                ${item.clinical_notes ? `<span class="marginalia">Note: ${item.clinical_notes}</span>` : ''}
                            </section>`;
                    }
                }
            } else if (Array.isArray(content)) {
                html += content.map(i => `<div class="ink-block"><h3>${i.category || i.word}</h3><p>${i.description || i.definition}</p></div>`).join('');
            }

            view.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3RD LEVEL | DASHBOARD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">

    <div class="blob"></div>
    <div class="blob2"></div>

    <div class="glass-app">
        <aside class="side-panel">
            <div class="brand">
                <i data-lucide="layers"></i>
                <span>LEVEL_03</span>
            </div>
            
            <nav class="nav-stack">
                <div class="nav-btn active" onclick="loadChapter('chapter_1_psychological_profiling', this)">
                    <i data-lucide="brain-circuit"></i>
                </div>
                <div class="nav-btn" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)">
                    <i data-lucide="activity"></i>
                </div>
                <div class="nav-btn" onclick="loadChapter('chapter_3_architectural_symbolism', this)">
                    <i data-lucide="map-pin"></i>
                </div>
                <div class="nav-btn" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)">
                    <i data-lucide="folder-search"></i>
                </div>
                <div class="nav-btn" onclick="loadChapter('chapter_5_glossary_of_concepts', this)">
                    <i data-lucide="book-key"></i>
                </div>
            </nav>
        </aside>

        <main class="main-view">
            <header class="view-header">
                <h1 id="chapter-title">PSYCHOLOGICAL ANALYSIS</h1>
                <div class="status-badge">SYSTEM_ACTIVE</div>
            </header>

            <div id="content-grid" class="content-grid">
                </div>
        </main>
    </div>

    <script>
        let db = {};

        async function init() {
            const res = await fetch('/get_research');
            db = await res.json();
            loadChapter('chapter_1_psychological_profiling', document.querySelector('.nav-btn'));
            lucide.createIcons();
        }

        function loadChapter(key, el) {
            const data = db[key];
            const grid = document.getElementById('content-grid');
            const title = document.getElementById('chapter-title');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            title.innerText = key.replace(/_/g, ' ').split(' ').slice(2).join(' ').toUpperCase();

            grid.style.opacity = 0;
            setTimeout(() => {
                grid.innerHTML = renderRecursive(data);
                grid.style.opacity = 1;
                lucide.createIcons();
            }, 200);
        }

        function renderRecursive(node) {
            let html = "";
            if (typeof node === 'string') return `<div class="glass-card full-width"><p>${node}</p></div>`;
            
            if (Array.isArray(node)) {
                return `<div class="glass-card full-width"><ul>` + 
                    node.map(i => `<li>${typeof i === 'object' ? `<strong>${i.word || i.item || i.author}:</strong> ${i.definition || i.purpose || i.title}` : i}</li>`).join('') + 
                    `</ul></div>`;
            }

            if (typeof node === 'object') {
                const header = node.label || node.concept || node.term || node.word || "";
                const content = node.depth_analysis || node.description || node.truth || node.definition || "";
                const extra = node.clinical_notes || node.sociological_result || node.impact || "";

                if (header || content) {
                    html += `
                        <div class="glass-card">
                            <h3>${header}</h3>
                            <p>${content}</p>
                            ${extra ? `<div class="meta-tag">${extra}</div>` : ''}
                        </div>`;
                } else {
                    Object.values(node).forEach(v => html += renderRecursive(v));
                }
            }
            return html;
        }

        window.onload = init;
    </script>
</body>
</html>

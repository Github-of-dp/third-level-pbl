<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Third Level | Research</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo">THE THIRD LEVEL</div>
        <div class="subtitle">A Multidisciplinary Research Journal</div>
    </header>

    <div class="container">
        <nav class="side-nav">
            <ul>
                <li class="nav-item active" onclick="loadChapter('chapter_1_psychological_profiling', this)">I. Psychology</li>
                <li class="nav-item" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)">II. Stress Gap</li>
                <li class="nav-item" onclick="loadChapter('chapter_3_architectural_symbolism', this)">III. Architecture</li>
                <li class="nav-item" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)">IV. The Case File</li>
                <li class="nav-item" onclick="loadChapter('chapter_5_glossary_of_concepts', this)">V. Concepts</li>
            </ul>
        </nav>

        <article class="content-area" id="view">
            </article>
    </div>

    <script>
        let db = {};

        async function init() {
            try {
                const response = await fetch('/get_research');
                db = await response.json();
                loadChapter('chapter_1_psychological_profiling', document.querySelector('.nav-item'));
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function loadChapter(key, el) {
            const data = db[key];
            const view = document.getElementById('view');

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // Scroll to top
            view.scrollTo({top: 0, behavior: 'smooth'});

            let html = `<div class="fade-in">`;
            html += `<p class="chapter-num">${key.split('_')[1].toUpperCase()}</p>`;
            html += `<h1 class="article-title">${key.replace(/_/g, ' ').split(' ').slice(2).join(' ').toUpperCase()}</h1>`;
            
            if (data) {
                Object.keys(data).forEach(sectionKey => {
                    const section = data[sectionKey];

                    if (typeof section === 'object' && !Array.isArray(section)) {
                        const title = section.label || section.concept || section.term || sectionKey.replace(/_/g, ' ');
                        const body = section.depth_analysis || section.description || section.truth || section.definition || section.content || "";
                        const note = section.clinical_notes || section.sociological_result || section.thematic_link || "";

                        html += `
                            <section class="article-section">
                                <h2>${title}</h2>
                                <p>${body}</p>
                                ${note ? `<aside class="pull-quote">${note}</aside>` : ''}
                                ${section.sensory_anchors ? `
                                    <div class="data-box">
                                        <h4>Observations</h4>
                                        <ul>${section.sensory_anchors.map(a => `<li><strong>${a.item}:</strong> ${a.purpose}</li>`).join('')}</ul>
                                    </div>` : ''}
                            </section>`;
                    } else if (Array.isArray(section)) {
                        html += `<section class="article-section"><h3>${sectionKey.replace(/_/g, ' ')}</h3><ul>`;
                        section.forEach(item => {
                            if (typeof item === 'object') {
                                html += `<li><strong>${item.word || item.author || item.category || ''}:</strong> ${item.definition || item.title || item.use_case || ''}</li>`;
                            } else {
                                html += `<li>${item}</li>`;
                            }
                        });
                        html += `</ul></section>`;
                    }
                });
            }
            html += `</div>`;
            view.innerHTML = html;
        }

        window.onload = init;
    </script>
</body>
</html>

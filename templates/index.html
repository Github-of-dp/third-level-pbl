<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE THIRD LEVEL | PROJECT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="grain"></div>

    <nav class="side-nav">
        <div class="nav-item" onclick="scrollLevel(0)">I. PSYCHE</div>
        <div class="nav-item" onclick="scrollLevel(1)">II. STRESS</div>
        <div class="nav-item" onclick="scrollLevel(2)">III. PORTAL</div>
        <div class="nav-item" onclick="scrollLevel(3)">IV. VERDICT</div>
    </nav>

    <div class="level-wrapper">
        <section class="level" id="level-0">
            <div class="container">
                <h1 class="glitch-text" id="psych-title"></h1>
                <h3 id="psych-sub"></h3>
                <p id="psych-content"></p>
                <div id="psych-list" class="points-grid"></div>
            </div>
        </section>

        <section class="level" id="level-1">
            <div class="container">
                <h1 id="comp-title"></h1>
                <div class="comparison-flex">
                    <div class="comp-box">
                        <h3>1894</h3>
                        <ul id="vintage-list"></ul>
                    </div>
                    <div class="comp-box">
                        <h3>2026</h3>
                        <ul id="modern-list"></ul>
                    </div>
                </div>
            </div>
        </section>

        <section class="level" id="level-2">
            <div class="container">
                <h1 id="hist-title"></h1>
                <h3 id="hist-sub"></h3>
                <p id="hist-content" class="large-text"></p>
            </div>
        </section>

        <section class="level" id="level-3">
            <div class="container">
                <div class="final-card">
                    <h1 id="v-title"></h1>
                    <p id="v-content"></p>
                </div>
            </div>
        </section>
    </div>

    <script>
        let data = {};
        fetch('/get_research')
            .then(res => res.json())
            .then(resData => {
                data = resData;
                populate();
            });

        function populate() {
            document.getElementById('psych-title').innerText = data.psychology.title;
            document.getElementById('psych-sub').innerText = data.psychology.subtitle;
            document.getElementById('psych-content').innerText = data.psychology.content;
            document.getElementById('psych-list').innerHTML = data.psychology.points.map(p => `<div class='point'>${p}</div>`).join('');

            document.getElementById('comp-title').innerText = data.comparison.title;
            document.getElementById('vintage-list').innerHTML = data.comparison.vintage_stress.map(s => `<li>${s}</li>`).join('');
            document.getElementById('modern-list').innerHTML = data.comparison.modern_stress.map(s => `<li>${s}</li>`).join('');

            document.getElementById('hist-title').innerText = data.history.title;
            document.getElementById('hist-sub').innerText = data.history.subtitle;
            document.getElementById('hist-content').innerText = data.history.content;

            document.getElementById('v-title').innerText = data.verdict.title;
            document.getElementById('v-content').innerText = data.verdict.content;
        }

        function scrollLevel(idx) {
            gsap.to(".level-wrapper", { x: -(idx * 100) + "vw", duration: 1.5, ease: "power4.inOut" });
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.style.opacity = (i === idx) ? "1" : "0.3";
            });
        }
    </script>
</body>
</html>

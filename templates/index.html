<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE THIRD LEVEL | DIGITAL ARCHIVE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

    <nav class="top-nav">
        <div class="nav-brand">ARCHIVE/G.C.T</div>
        <div class="nav-links">
            <span class="nav-link active" onclick="loadChapter('chapter_1_psychological_profiling', this)">I. PSYCHE</span>
            <span class="nav-link" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)">II. STRESS</span>
            <span class="nav-link" onclick="loadChapter('chapter_3_architectural_symbolism', this)">III. SPACE</span>
            <span class="nav-link" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)">IV. DOSSIER</span>
            <span class="nav-link" onclick="loadChapter('chapter_5_glossary_of_concepts', this)">V. INDEX</span>
        </div>
    </nav>

    <main class="viewport">
        <article id="view" class="reader-mode">
            </article>
    </main>

    <script>
        let db = {};

        // 1. Initialize and Fetch Data
        async function init() {
            try {
                const response = await fetch('/get_research');
                db = await response.json();
                console.log("Archive loaded successfully.");
                // Set default page
                loadChapter('chapter_1_psychological_profiling', document.querySelector('.nav-link'));
            } catch (err) {
                console.error("Archive Access Denied:", err);
            }
        }

        // 2. Recursive Parsing Engine (Fixes the Chapter III and IV empty nodes)
        function parseData(node) {
            let html = "";
            
            if (typeof node === 'string') {
                return `<p class="body-text">${node}</p>`;
            }

            if (Array.isArray(node)) {
                html += `<ul class="data-list">`;
                node.forEach(item => {
                    if (typeof item === 'object') {
                        html += `<li><span class="data-label">${item.word || item.author || item.item || item.category || 'ENTRY'}</span> ${item.definition || item.title || item.purpose || item.use_case || ''}</li>`;
                    } else {
                        html += `<li>${item}</li>`;
                    }
                });
                return html + `</ul>`;
            }

            if (typeof node === 'object' && node !== null) {
                const title = node.label || node.concept || node.term || node.word || node.subtitle || "";
                const body = node.depth_analysis || node.description || node.truth || node.definition || node.initial_assessment || node.summary || "";
                const meta = node.clinical_notes || node.sociological_result || node.thematic_link || node.impact || "";

                // If node has terminal data, render it
                if (title || body) {
                    html += `<div class="content-section">`;
                    if (title) html += `<h2 class="section-head">${title}</h2>`;
                    if (body) html += `<p class="body-text">${body}</p>`;
                    if (meta) html += `<blockquote class="meta-note">${meta}</blockquote>`;
                    
                    // Special handling for sensory anchors if they exist
                    if (node.sensory_anchors) {
                        html += `<div class="observation-box"><h5>Field Observations</h5><ul>`;
                        node.sensory_anchors.forEach(a => html += `<li><strong>${a.item}:</strong> ${a.purpose}</li>`);
                        html += `</ul></div>`;
                    }
                    html += `</div>`;
                } else {
                    // It's a container (like chapter_3), dig into children
                    Object.values(node).forEach(v => {
                        html += parseData(v);
                    });
                }
            }
            return html;
        }

        // 3. UI Interaction Logic
        function loadChapter(key, el) {
            const view = document.getElementById('view');
            
            // UI States
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            view.classList.remove('loaded');
            
            // Build Content
            setTimeout(() => {
                let html = `<div class="hero">`;
                html += `<div class="kicker">DOCUMENTATION / 0${key.split('_')[1] || 'X'}</div>`;
                html += `<h1 class="title">${key.replace(/_/g, ' ').split(' ').slice(2).join(' ')}</h1>`;
                html += `</div><div class="reading-pane">`;
                
                if (db[key]) {
                    html += parseData(db[key]);
                } else {
                    html += `<p class="body-text">Error: Data segment [${key}] is undefined in source JSON.</p>`;
                }
                
                html += `</div>`;
                
                view.innerHTML = html;
                view.classList.add('loaded');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        // 4. UX: Scroll Tracking
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        window.onload = init;
    </script>
</body>
</html>

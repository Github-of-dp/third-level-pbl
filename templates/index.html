<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Third Level | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="layers"></i>
            <span>LEVEL.03</span>
        </div>
        <nav class="menu">
            <div class="menu-item active" onclick="loadTab('psychology', this)">
                <i data-lucide="brain"></i> <span>Psychology</span>
            </div>
            <div class="menu-item" onclick="loadTab('comparison', this)">
                <i data-lucide="git-compare"></i> <span>Stress Gap</span>
            </div>
            <div class="menu-item" onclick="loadTab('history', this)">
                <i data-lucide="map"></i> <span>The Hub</span>
            </div>
            <div class="menu-item" onclick="loadTab('verdict', this)">
                <i data-lucide="check-circle"></i> <span>The Verdict</span>
            </div>
        </nav>
    </aside>

    <main class="content">
        <header class="content-header">
            <h1 id="view-title">Loading...</h1>
            <p id="view-desc"></p>
        </header>

        <div id="dynamic-content" class="animate__animated">
            </div>
    </main>
</div>

<script>
    let rData = {};

    fetch('/get_research')
        .then(res => res.json())
        .then(data => {
            rData = data;
            loadTab('psychology', document.querySelector('.menu-item'));
            lucide.createIcons();
        });

    function loadTab(key, el) {
        const data = rData[key];
        const container = document.getElementById('dynamic-content');
        
        // UI Updates
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-title').innerText = data.title;
        document.getElementById('view-desc').innerText = data.description;

        // Animation
        container.classList.remove('animate__fadeInUp');
        void container.offsetWidth; // Trigger reflow
        container.classList.add('animate__fadeInUp');

        if(key === 'psychology') {
            container.innerHTML = `<div class="card-grid">${data.content.map(c => `
                <div class="card">
                    <h3>${c.label}</h3>
                    <p>${c.text}</p>
                </div>`).join('')}</div>`;
        } else if(key === 'comparison') {
            container.innerHTML = `
                <div class="comp-wrapper">
                    <div class="comp-card"><h4>1890s</h4><ul>${data.vintage.map(i => `<li>${i}</li>`).join('')}</ul></div>
                    <div class="comp-card highlight"><h4>2026</h4><ul>${data.modern.map(i => `<li>${i}</li>`).join('')}</ul></div>
                </div>`;
        } else if(key === 'history') {
            container.innerHTML = `<div class="card long-card"><p>${data.details}</p></div>`;
        } else {
            container.innerHTML = `<div class="card verdict-card"><p>${data.analysis}</p></div>`;
        }
    }
</script>
</body>
</html>

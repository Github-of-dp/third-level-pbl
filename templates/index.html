<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE THIRD LEVEL | DIGITAL ARCHIVE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

    <nav class="top-nav">
        <div class="nav-brand">ARCHIVE/1894</div>
        <div class="nav-links">
            <span class="nav-link active" onclick="loadChapter('chapter_1_psychological_profiling', this)">PSYCHE</span>
            <span class="nav-link" onclick="loadChapter('chapter_2_socio_economic_stress_gap', this)">STRESS</span>
            <span class="nav-link" onclick="loadChapter('chapter_3_architectural_symbolism', this)">SPACE</span>
            <span class="nav-link" onclick="loadChapter('chapter_4_sam_weiner_dossier', this)">DOSSIER</span>
            <span class="nav-link" onclick="loadChapter('chapter_5_glossary_of_concepts', this)">INDEX</span>
        </div>
    </nav>

    <main class="viewport">
        <article id="view" class="reader-mode">
            </article>
    </main>

    <script>
        let db = {};

        async function init() {
            try {
                const response = await fetch('/get_research');
                db = await response.json();
                loadChapter('chapter_1_psychological_profiling', document.querySelector('.nav-link'));
            } catch (err) { console.error("Archive inaccessible:", err); }
        }

        // Recursive engine to capture every bit of research
        function parseData(node) {
            let html = "";
            if (typeof node === 'string') return `<p class="body-text">${node}</p>`;
            if (Array.isArray(node)) {
                html += `<ul class="data-list">`;
                node.forEach(item => {
                    if (typeof item === 'object') {
                        html += `<li><span class="data-label">${item.word || item.author || item.item || ''}</span> ${item.definition || item.title || item.purpose || ''}</li>`;
                    } else { html += `<li>${item}</li>`; }
                });
                return html + `</ul>`;
            }
            if (typeof node === 'object') {
                const title = node.label || node.concept || node.term || node.word || "";
                const body = node.depth_analysis || node.description || node.truth || node.definition || node.initial_assessment || node.summary || "";
                const meta = node.clinical_notes || node.sociological_result || node.thematic_link || node.impact || "";

                if (title || body) {
                    html += `<div class="content-section">`;
                    if (title) html += `<h2 class="section-head">${title}</h2>`;
                    if (body) html += `<p class="body-text">${body}</p>`;
                    if (meta) html += `<blockquote class="meta-note">${meta}</blockquote>`;
                    html += `</div>`;
                } else {
                    Object.values(node).forEach(v => html += parseData(v));
                }
            }
            return html;
        }

        function loadChapter(key, el) {
            const view = document.getElementById('view');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');

            view.classList.remove('loaded');
            
            setTimeout(() => {
                let html = `<div class="hero">`;
                html += `<div class="kicker">Chapter Analysis / 0${key.split('_')[1]}</div>`;
                html += `<h1 class="title">${key.replace(/_/g, ' ').split(' ').slice(2).join(' ')}</h1>`;
                html += `</div><div class="reading-pane">`;
                html += parseData(db[key]);
                html += `</div>`;
                
                view.innerHTML = html;
                view.classList.add('loaded');
                window.scrollTo(0, 0);
            }, 300);
        }

        // UX: Scroll Progress
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        window.onload = init;
    </script>
</body>
</html>
